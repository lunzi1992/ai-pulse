<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Pulse - 全球 AI 资讯每日聚合</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #12121a;
      --bg3: #1a1a25;
      --bg4: #20202e;
      --border: #2a2a3a;
      --text: #e4e4ef;
      --text2: #8888a0;
      --text3: #555568;
      --accent: #7c6af7;
      --accent2: #f76a8c;
      --cn: #f7a26a;
      --global: #6af7c2;
      --industry: #f7c26a;
      --tech: #6af7f7;
      --community: #6a9ff7;
      --tools: #c26af7;
      --high: #f76a8c;
      --radius: 12px;
      --sidebar-w: 264px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ─── 滚动条 ─── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

    /* ─── 侧边栏 ─── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
    }

    /* 品牌区 */
    .sidebar-brand {
      padding: 18px 14px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .brand-logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .brand-text strong { display: block; font-size: 15px; font-weight: 700; line-height: 1.2; }
    .brand-text span { font-size: 10px; color: var(--text3); }

    /* 可滚动内容区 */
    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
    }

    /* 标签文字 */
    .sidebar-label {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--text3); margin: 0 0 8px;
    }

    /* 日历 */
    .calendar {
      background: var(--bg3);
      border-radius: var(--radius);
      padding: 10px;
      margin-bottom: 20px;
    }
    .calendar-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .calendar-month {
      font-size: 12px; font-weight: 600; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 130px;
    }
    .calendar-nav { display: flex; gap: 3px; }
    .calendar-nav button {
      background: var(--bg2); border: 1px solid var(--border);
      color: var(--text2); width: 24px; height: 24px;
      border-radius: 5px; cursor: pointer; font-size: 11px;
      transition: all 0.15s; line-height: 1;
    }
    .calendar-nav button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* 日历网格：固定尺寸，不依赖 fr 分片 */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 28px);  /* 固定 28px 宽 */
      gap: 2px;
      justify-content: start;  /* 左对齐，防止撑满 */
    }
    .cal-dn {
      font-size: 9px; color: var(--text3);
      text-align: center; padding: 4px 0;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
    }
    .cal-d {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; border-radius: 5px; cursor: pointer;
      color: var(--text3); transition: all 0.15s; position: relative;
      user-select: none;
    }
    .cal-d:hover { background: var(--bg2); color: var(--text); }
    .cal-d.empty { cursor: default; pointer-events: none; visibility: hidden; }
    .cal-d.today { background: var(--accent); color: #fff; font-weight: 700; }
    .cal-d.has-data { color: var(--text); font-weight: 500; }
    .cal-d.has-data::after {
      content: ''; position: absolute;
      bottom: 2px; left: 50%; transform: translateX(-50%);
      width: 3px; height: 3px; background: var(--accent2); border-radius: 50%;
    }
    .cal-d.selected:not(.today) { background: var(--accent); color: #fff; }
    .cal-d.selected.has-data::after { background: rgba(255,255,255,0.6); }

    /* 模块导航 */
    .module-nav { display: flex; flex-direction: column; gap: 3px; margin-bottom: 20px; }
    .mod-btn {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 11px; border-radius: 9px;
      border: 1px solid transparent; background: transparent;
      color: var(--text2); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s; text-align: left; width: 100%;
    }
    .mod-btn:hover { background: var(--bg3); color: var(--text); }
    .mod-btn.active { border-color: var(--border); background: var(--bg3); color: var(--text); }
    .mod-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .mod-badge {
      margin-left: auto; font-size: 10px;
      background: var(--bg); padding: 2px 6px;
      border-radius: 8px; color: var(--text3);
    }

    /* 热词 */
    .hot-keywords { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; }
    .kw-tag {
      display: inline-flex; align-items: center;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text2); font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      padding: 3px 7px; border-radius: 5px;
      cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .kw-tag:hover { border-color: var(--accent); color: var(--accent); }
    .kw-cnt { margin-left: 4px; color: var(--text3); font-size: 9px; }

    /* 底部 */
    .sidebar-footer {
      flex-shrink: 0;
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      font-size: 10px; color: var(--text3); line-height: 1.8;
    }
    .sidebar-footer a { color: var(--text3); text-decoration: none; }
    .sidebar-footer a:hover { color: var(--accent); }

    /* ─── 主内容区 ─── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 28px 36px;
      max-width: 1000px;
    }

    /* 顶部标题栏 */
    .main-header { margin-bottom: 24px; }
    .main-date-row {
      display: flex; align-items: baseline; gap: 12px;
      margin-bottom: 6px;
    }
    .main-date {
      font-size: 26px; font-weight: 700; line-height: 1;
    }
    .main-date-badge {
      font-size: 12px; color: var(--text3);
      background: var(--bg3); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 20px;
    }
    .main-meta { font-size: 12px; color: var(--text3); }

    /* 地域 Tab */
    .region-tabs {
      display: flex; gap: 6px; margin-bottom: 20px;
    }
    .region-tab {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 16px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg2);
      color: var(--text2); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .region-tab:hover { border-color: var(--text2); color: var(--text); }
    .region-tab.active.all {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }
    .region-tab.active.cn {
      background: var(--cn); border-color: var(--cn); color: #000;
    }
    .region-tab.active.global {
      background: var(--global); border-color: var(--global); color: #000;
    }
    .region-tab .cnt {
      font-size: 10px; opacity: 0.7;
      background: rgba(255,255,255,0.15); padding: 1px 5px; border-radius: 8px;
    }

    /* 搜索 + 分类筛选 */
    .filter-bar {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 24px; flex-wrap: wrap;
    }
    .search-box { position: relative; flex: 1; min-width: 180px; }
    .search-box input {
      width: 100%; background: var(--bg2);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 14px 8px 34px; color: var(--text);
      font-size: 13px; outline: none; transition: border-color 0.15s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box input::placeholder { color: var(--text3); }
    .search-icon {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%); font-size: 13px; pointer-events: none;
    }
    .filter-sep { width: 1px; height: 20px; background: var(--border); }
    .f-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--bg2);
      color: var(--text2); font-size: 12px; cursor: pointer; transition: all 0.15s;
    }
    .f-chip:hover { border-color: var(--text2); color: var(--text); }
    .f-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .f-chip .fdot { width: 6px; height: 6px; border-radius: 50%; }

    /* 今日头条 */
    .headline-section { margin-bottom: 28px; }
    .section-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text3); margin-bottom: 12px;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .headline-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .headline-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .headline-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
    }
    .headline-card.industry::before { background: var(--industry); }
    .headline-card.tech::before { background: var(--tech); }
    .headline-card.community::before { background: var(--community); }
    .headline-card.tools::before { background: var(--tools); }
    .headline-card:hover {
      border-color: var(--accent); transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(124,106,247,0.15);
    }
    .headline-tags {
      display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap;
    }
    .tag-pill {
      font-size: 10px; font-weight: 600; padding: 2px 8px;
      border-radius: 20px; letter-spacing: 0.3px;
    }
    .tag-pill.industry { background: rgba(247,194,106,0.15); color: var(--industry); }
    .tag-pill.tech { background: rgba(106,247,247,0.15); color: var(--tech); }
    .tag-pill.community { background: rgba(106,159,247,0.15); color: var(--community); }
    .tag-pill.tools { background: rgba(194,106,247,0.15); color: var(--tools); }
    .tag-pill.cn { background: rgba(247,162,106,0.15); color: var(--cn); }
    .tag-pill.global { background: rgba(106,247,194,0.15); color: var(--global); }
    .tag-pill.high { background: rgba(247,106,140,0.15); color: var(--high); }
    .headline-title {
      font-size: 14px; font-weight: 600; color: var(--text);
      line-height: 1.5; margin-bottom: 8px;
    }
    .headline-title a { color: inherit; text-decoration: none; }
    .headline-title a:hover { color: var(--accent); }
    .headline-summary {
      font-size: 12px; color: var(--text2); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; margin-bottom: 10px;
    }
    .headline-foot {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text3);
    }
    .source-badge {
      background: var(--bg3); padding: 2px 7px;
      border-radius: 4px; font-size: 10px;
    }
    .headline-foot a {
      margin-left: auto; color: var(--accent); text-decoration: none;
      font-size: 11px;
    }
    .headline-foot a:hover { text-decoration: underline; }

    /* 4模块概览 */
    .overview-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 12px; margin-bottom: 28px;
    }
    .ov-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      transition: border-color 0.2s;
    }
    .ov-card:hover { border-color: var(--border); }
    .ov-header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
    }
    .ov-icon { font-size: 16px; }
    .ov-title { font-size: 13px; font-weight: 600; }
    .ov-count {
      margin-left: auto; font-size: 11px;
      background: var(--bg3); padding: 2px 8px;
      border-radius: 8px; color: var(--text3);
    }
    .ov-body { padding: 10px 14px; }
    .ov-item {
      padding: 7px 0; border-bottom: 1px solid var(--border);
      font-size: 12px; color: var(--text2);
    }
    .ov-item:last-child { border-bottom: none; }
    .ov-item a { color: var(--text2); text-decoration: none; }
    .ov-item a:hover { color: var(--accent); }
    .ov-item-region {
      display: inline-block; font-size: 10px; margin-right: 4px;
    }

    /* 新闻列表区 */
    .news-section { margin-bottom: 36px; }
    .news-section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }
    .news-section-header.industry { border-color: var(--industry); }
    .news-section-header.tech { border-color: var(--tech); }
    .news-section-header.community { border-color: var(--community); }
    .news-section-header.tools { border-color: var(--tools); }
    .nsh-icon { font-size: 20px; }
    .nsh-title { font-size: 17px; font-weight: 700; }
    .nsh-desc { font-size: 11px; color: var(--text3); }
    .nsh-cnt {
      margin-left: auto; font-size: 11px; color: var(--text3);
      background: var(--bg3); padding: 3px 10px; border-radius: 8px;
    }

    /* 地域分组 */
    .region-group { margin-bottom: 20px; }
    .region-group-title {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600; color: var(--text3);
      margin-bottom: 10px; padding: 6px 10px;
      background: var(--bg3); border-radius: 7px;
      border-left: 3px solid;
    }
    .region-group-title.cn { border-color: var(--cn); color: var(--cn); }
    .region-group-title.global { border-color: var(--global); color: var(--global); }

    /* 新闻卡片 */
    .news-item {
      padding: 14px 0; border-bottom: 1px solid var(--border);
      animation: fadeIn 0.25s ease-out;
    }
    .news-item:last-child { border-bottom: none; }
    .news-item-head { display: flex; gap: 10px; margin-bottom: 6px; align-items: flex-start; }
    .news-item-title {
      font-size: 14px; font-weight: 600; color: var(--text);
      line-height: 1.5; flex: 1;
    }
    .news-item-title a { color: inherit; text-decoration: none; }
    .news-item-title a:hover { color: var(--accent); }
    .imp-badge {
      flex-shrink: 0; font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 5px; margin-top: 2px;
      background: rgba(247,106,140,0.12); color: var(--high);
    }
    .news-item-meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text3); flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .news-item-summary {
      font-size: 12px; color: var(--text2); line-height: 1.7;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .news-item-summary.expanded { -webkit-line-clamp: unset; }
    .news-item-actions {
      display: flex; align-items: center; gap: 12px; margin-top: 8px;
    }
    .btn-expand {
      font-size: 11px; color: var(--text3); cursor: pointer;
      background: none; border: none; padding: 0;
      transition: color 0.15s;
    }
    .btn-expand:hover { color: var(--accent); }
    .btn-read {
      font-size: 11px; color: var(--accent); text-decoration: none;
    }
    .btn-read:hover { text-decoration: underline; }

    /* 空状态 */
    .empty {
      text-align: center; padding: 60px 20px;
      color: var(--text3);
    }
    .empty .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty p { font-size: 13px; }

    /* 加载态 */
    .loading {
      text-align: center; padding: 80px 20px;
      color: var(--text3); font-size: 14px;
    }
    .loading-dot {
      display: inline-block; animation: pulse 1.4s infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 响应式 */
    @media (max-width: 900px) {
      .overview-grid { grid-template-columns: 1fr; }
      .headline-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      :root { --sidebar-w: 0px; }
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 16px; }
    }
  </style>
</head>
<body>

<!-- ═══ 侧边栏 ═══ -->
<aside class="sidebar">
  <!-- 品牌区: flex-shrink:0 -->
  <div class="sidebar-brand">
    <div class="brand-logo">🤖</div>
    <div class="brand-text">
      <strong>AI Pulse</strong>
      <span>全球 AI 资讯聚合</span>
    </div>
  </div>

  <!-- 可滚动内容: flex:1, overflow-y:auto -->
  <div class="sidebar-body">
    <div class="sidebar-label">日历存档</div>
    <div class="calendar">
      <div class="calendar-header">
        <span class="calendar-month" id="calMonth"></span>
        <div class="calendar-nav">
          <button onclick="calNav(-1)">‹</button>
          <button onclick="calNav(1)">›</button>
        </div>
      </div>
      <div class="calendar-grid" id="calGrid"></div>
    </div>

    <div class="sidebar-label" style="margin-top:20px">内容模块</div>
    <div class="module-nav" id="moduleNav"></div>

    <div class="sidebar-label" style="margin-top:16px">今日热词</div>
    <div class="hot-keywords" id="hotKeywords"></div>
  </div>

  <!-- 底部: flex-shrink:0 -->
  <div class="sidebar-footer">
    数据每日 08:30 自动更新<br>
    <a href="https://github.com/lunzi1992/ai-pulse" target="_blank">GitHub</a>
    &nbsp;·&nbsp;
    <a href="https://lunzi1992.github.io/ai-pulse" target="_blank">官网</a>
  </div>
</aside>

<!-- ═══ 主内容区 ═══ -->
<main class="main">
  <!-- 标题 -->
  <div class="main-header">
    <div class="main-date-row">
      <div class="main-date" id="mainDate"><span class="loading-dot">·</span><span class="loading-dot">·</span><span class="loading-dot">·</span></div>
      <span class="main-date-badge" id="mainBadge"></span>
    </div>
    <div class="main-meta" id="mainMeta"></div>
  </div>

  <!-- 地域切换 Tab -->
  <div class="region-tabs" id="regionTabs">
    <button class="region-tab active all" data-region="all" onclick="setRegion('all')">🌐 全部</button>
    <button class="region-tab cn" data-region="cn" onclick="setRegion('cn')">🇨🇳 国内</button>
    <button class="region-tab global" data-region="global" onclick="setRegion('global')">🌍 国际</button>
  </div>

  <!-- 搜索 + 模块筛选 -->
  <div class="filter-bar">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索关键词..." oninput="onSearch()">
    </div>
    <div class="filter-sep"></div>
    <button class="f-chip active" data-module="all" onclick="setModule('all')">
      <span class="fdot" style="background:var(--accent)"></span> 全部
    </button>
    <button class="f-chip" data-module="industry" onclick="setModule('industry')">
      <span class="fdot" style="background:var(--industry)"></span> 行业
    </button>
    <button class="f-chip" data-module="tech" onclick="setModule('tech')">
      <span class="fdot" style="background:var(--tech)"></span> 技术
    </button>
    <button class="f-chip" data-module="community" onclick="setModule('community')">
      <span class="fdot" style="background:var(--community)"></span> 社区
    </button>
    <button class="f-chip" data-module="tools" onclick="setModule('tools')">
      <span class="fdot" style="background:var(--tools)"></span> 工具
    </button>
  </div>

  <!-- 今日头条 -->
  <div class="headline-section" id="headlineSection" style="display:none">
    <div class="section-label">🔥 今日头条</div>
    <div class="headline-grid" id="headlineGrid"></div>
  </div>

  <!-- 4模块概览 -->
  <div id="overviewSection" style="display:none">
    <div class="section-label">📊 今日概览</div>
    <div class="overview-grid" id="overviewGrid"></div>
  </div>

  <!-- 新闻列表 -->
  <div id="newsList"></div>
</main>

<script>
// ════════════════════════════════════════════════════════════════
// 状态
// ════════════════════════════════════════════════════════════════
let allNews = [];
let currentModule = 'all';
let currentRegion = 'all';
let currentDate  = new Date().toISOString().split('T')[0];
let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth();
let datesWithData = new Set();
let searchTimer  = null;

// ════════════════════════════════════════════════════════════════
// 常量
// ════════════════════════════════════════════════════════════════
const MODULE_META = {
  industry:  { icon: '🏢', name: '行业动态', desc: '融资·并购·政策·市场', color: 'var(--industry)' },
  tech:      { icon: '🔬', name: '技术进展', desc: '论文·模型·开源·研究', color: 'var(--tech)' },
  community: { icon: '💬', name: '社区洞察', desc: '讨论·趋势·观点·评测', color: 'var(--community)' },
  tools:     { icon: '🛠️', name: '工具与应用', desc: '产品·效率·开源工具', color: 'var(--tools)' }
};

// ════════════════════════════════════════════════════════════════
// 工具函数
// ════════════════════════════════════════════════════════════════
function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(ds) {
  const d = new Date(ds + 'T00:00:00');
  const wd = ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
  return `${d.getMonth()+1}月${d.getDate()}日 ${wd}`;
}

function regionLabel(r) {
  return r === 'cn' ? '🇨🇳' : '🌍';
}

// ════════════════════════════════════════════════════════════════
// 筛选逻辑
// ════════════════════════════════════════════════════════════════
function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return allNews.filter(n => {
    if (n.date !== currentDate) return false;
    if (currentModule !== 'all' && n.module !== currentModule) return false;
    if (currentRegion !== 'all' && n.region !== currentRegion) return false;
    if (q) {
      const t = (n.title + ' ' + (n.summary || '')).toLowerCase();
      if (!t.includes(q)) return false;
    }
    return true;
  });
}

// ════════════════════════════════════════════════════════════════
// 日历
// ════════════════════════════════════════════════════════════════
function renderCalendar() {
  const mn = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('calMonth').textContent = `${calYear}年 ${mn[calMonth]}`;

  const g = document.getElementById('calGrid');
  const dnames = ['日','一','二','三','四','五','六'];
  g.innerHTML = dnames.map(d => `<div class="cal-dn">${d}</div>`).join('');

  const firstDay    = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today       = new Date().toISOString().split('T')[0];

  for (let i = 0; i < firstDay; i++) g.innerHTML += '<div class="cal-d empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls = 'cal-d';
    if (ds === today) cls += ' today';
    if (ds === currentDate && ds !== today) cls += ' selected';
    if (datesWithData.has(ds)) cls += ' has-data';
    g.innerHTML += `<div class="${cls}" onclick="selectDate('${ds}')">${d}</div>`;
  }
}

function calNav(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar();
}

function selectDate(d) {
  currentDate = d;
  renderCalendar();
  render();
}

// ════════════════════════════════════════════════════════════════
// 模块导航
// ════════════════════════════════════════════════════════════════
function renderModuleNav() {
  const dayNews = allNews.filter(n => n.date === currentDate);
  const counts = {};
  dayNews.forEach(n => counts[n.module] = (counts[n.module]||0)+1);

  const nav = document.getElementById('moduleNav');
  const mods = ['all','industry','tech','community','tools'];
  nav.innerHTML = mods.map(m => {
    const cnt = m === 'all' ? dayNews.length : (counts[m]||0);
    const meta = MODULE_META[m] || { name:'全部', color:'var(--accent)' };
    const active = m === currentModule ? 'active' : '';
    const color = m === 'all' ? 'var(--accent)' : meta.color;
    return `<button class="mod-btn ${active}" onclick="setModule('${m}')">
      <span class="mod-dot" style="background:${color}"></span>
      ${meta.name || '全部'}
      <span class="mod-badge">${cnt}</span>
    </button>`;
  }).join('');
}

// ════════════════════════════════════════════════════════════════
// 热词
// ════════════════════════════════════════════════════════════════
function renderHotKeywords(kws) {
  document.getElementById('hotKeywords').innerHTML = kws.slice(0, 15).map(k =>
    `<span class="kw-tag" onclick="searchByKeyword('${escHtml(k.name)}')">${escHtml(k.name)}<span class="kw-cnt">${k.count}</span></span>`
  ).join('');
}

function searchByKeyword(kw) {
  document.getElementById('searchInput').value = kw;
  onSearch();
}

// ════════════════════════════════════════════════════════════════
// 今日头条
// ════════════════════════════════════════════════════════════════
function renderHeadlines(filtered) {
  const highs = filtered.filter(n => n.importance === 'high').slice(0, 4);
  const sec = document.getElementById('headlineSection');
  const grid = document.getElementById('headlineGrid');

  if (highs.length === 0) { sec.style.display = 'none'; return; }
  sec.style.display = '';

  grid.innerHTML = highs.map(n => {
    const mod = MODULE_META[n.module] || { name: n.module };
    const rLabel = n.region === 'cn' ? '🇨🇳 国内' : '🌍 国际';
    const rClass = n.region === 'cn' ? 'cn' : 'global';
    return `
    <div class="headline-card ${escHtml(n.module)}">
      <div class="headline-tags">
        <span class="tag-pill ${escHtml(n.module)}">${escHtml(mod.name)}</span>
        <span class="tag-pill ${rClass}">${rLabel}</span>
        <span class="tag-pill high">🔥 重要</span>
      </div>
      <div class="headline-title">
        ${n.url ? `<a href="${escHtml(n.url)}" target="_blank" rel="noopener">${escHtml(n.title)}</a>` : escHtml(n.title)}
      </div>
      ${n.summary ? `<div class="headline-summary">${escHtml(n.summary)}</div>` : ''}
      <div class="headline-foot">
        <span class="source-badge">${escHtml(n.source)}</span>
        <span>${n.date}</span>
        ${n.url ? `<a href="${escHtml(n.url)}" target="_blank" rel="noopener">阅读原文 →</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════════════════════
// 4模块概览
// ════════════════════════════════════════════════════════════════
function renderOverview(filtered) {
  const sec = document.getElementById('overviewSection');
  const grid = document.getElementById('overviewGrid');
  const mods = ['industry','tech','community','tools'];

  const hasAny = mods.some(m => filtered.some(n => n.module === m));
  if (!hasAny) { sec.style.display = 'none'; return; }
  sec.style.display = '';

  grid.innerHTML = mods.map(m => {
    const meta = MODULE_META[m];
    const items = filtered.filter(n => n.module === m).slice(0, 4);
    if (!items.length) return '';
    return `
    <div class="ov-card">
      <div class="ov-header">
        <span class="ov-icon">${meta.icon}</span>
        <span class="ov-title" style="color:${meta.color}">${meta.name}</span>
        <span class="ov-count">${filtered.filter(n=>n.module===m).length}条</span>
      </div>
      <div class="ov-body">
        ${items.map(n => `
        <div class="ov-item">
          <span class="ov-item-region">${regionLabel(n.region)}</span>
          ${n.url
            ? `<a href="${escHtml(n.url)}" target="_blank" rel="noopener">${escHtml(n.title)}</a>`
            : escHtml(n.title)
          }
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════════════════════
// 新闻列表
// ════════════════════════════════════════════════════════════════
function renderNewsList(filtered) {
  const list = document.getElementById('newsList');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>暂无符合条件的资讯</p></div>`;
    return;
  }

  const mods = ['industry','tech','community','tools'];
  let html = '';

  for (const mod of mods) {
    const modItems = filtered.filter(n => n.module === mod);
    if (!modItems.length) continue;
    const meta = MODULE_META[mod];

    // 分地域（当 region=all 时才分组展示）
    const cnItems     = modItems.filter(n => n.region === 'cn');
    const globalItems = modItems.filter(n => n.region === 'global');

    html += `
    <div class="news-section">
      <div class="news-section-header ${mod}">
        <span class="nsh-icon">${meta.icon}</span>
        <span class="nsh-title">${meta.name}</span>
        <span class="nsh-desc">${meta.desc}</span>
        <span class="nsh-cnt">${modItems.length} 条</span>
      </div>`;

    if (currentRegion === 'all' && cnItems.length > 0 && globalItems.length > 0) {
      html += renderRegionGroup('cn', cnItems);
      html += renderRegionGroup('global', globalItems);
    } else {
      html += modItems.map(n => newsItemHtml(n)).join('');
    }
    html += `</div>`;
  }

  list.innerHTML = html;
}

function renderRegionGroup(region, items) {
  const label = region === 'cn' ? '🇨🇳 国内动态' : '🌍 国际动态';
  return `
  <div class="region-group">
    <div class="region-group-title ${region}">${label} · ${items.length}条</div>
    ${items.map(n => newsItemHtml(n)).join('')}
  </div>`;
}

function newsItemHtml(n) {
  const impBadge = n.importance === 'high'
    ? `<span class="imp-badge">🔥 重要</span>` : '';
  const hasSummary = n.summary && n.summary.length > 0;
  const canExpand  = hasSummary && n.summary.length > 150;
  const nid = escHtml(n.id);

  return `
  <div class="news-item" id="ni-${nid}">
    <div class="news-item-head">
      <div class="news-item-title">
        ${n.url
          ? `<a href="${escHtml(n.url)}" target="_blank" rel="noopener">${escHtml(n.title)}</a>`
          : escHtml(n.title)
        }
      </div>
      ${impBadge}
    </div>
    <div class="news-item-meta">
      <span class="source-badge">${escHtml(n.source)}</span>
      <span>${regionLabel(n.region)}</span>
      <span>${n.date}</span>
    </div>
    ${hasSummary ? `<div class="news-item-summary" id="sum-${nid}">${escHtml(n.summary)}</div>` : ''}
    ${hasSummary ? `
    <div class="news-item-actions">
      ${canExpand ? `<button class="btn-expand" onclick="toggleSum('${nid}',this)">展开摘要</button>` : ''}
      ${n.url ? `<a class="btn-read" href="${escHtml(n.url)}" target="_blank" rel="noopener">🔗 阅读原文 →</a>` : ''}
    </div>` : (n.url ? `<div class="news-item-actions"><a class="btn-read" href="${escHtml(n.url)}" target="_blank" rel="noopener">🔗 阅读原文 →</a></div>` : '')}
  </div>`;
}

function toggleSum(id, btn) {
  const el = document.getElementById('sum-' + id);
  if (!el) return;
  const expanded = el.classList.toggle('expanded');
  btn.textContent = expanded ? '收起摘要' : '展开摘要';
}

// ════════════════════════════════════════════════════════════════
// 主渲染
// ════════════════════════════════════════════════════════════════
function render() {
  const filtered = getFiltered();
  const allDay = allNews.filter(n => n.date === currentDate);

  // 更新地域 Tab 数字
  document.querySelectorAll('.region-tab').forEach(btn => {
    const r = btn.dataset.region;
    let cnt;
    if (r === 'all') cnt = allDay.length;
    else cnt = allDay.filter(n => n.region === r).length;
    // 更新或添加计数
    let cntEl = btn.querySelector('.cnt');
    if (!cntEl) {
      cntEl = document.createElement('span');
      cntEl.className = 'cnt';
      btn.appendChild(cntEl);
    }
    cntEl.textContent = cnt;
  });

  renderModuleNav();
  renderHeadlines(filtered);
  renderOverview(filtered);
  renderNewsList(filtered);
}

// ════════════════════════════════════════════════════════════════
// 事件处理
// ════════════════════════════════════════════════════════════════
function setModule(mod) {
  currentModule = mod;
  document.querySelectorAll('.f-chip').forEach(b => b.classList.toggle('active', b.dataset.module === mod));
  render();
}

function setRegion(r) {
  currentRegion = r;
  document.querySelectorAll('.region-tab').forEach(b => {
    const isActive = b.dataset.region === r;
    b.classList.toggle('active', isActive);
    b.classList.remove('all','cn','global');
    if (isActive) b.classList.add(r);
  });
  render();
}

function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 200);
}

// ════════════════════════════════════════════════════════════════
// 初始化
// ════════════════════════════════════════════════════════════════
async function init() {
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 8000);

    const resp = await fetch('news.json?v=' + Date.now(), { signal: controller.signal });
    clearTimeout(timer);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const data = await resp.json();
    allNews = data.news || [];

    datesWithData = new Set(allNews.map(n => n.date));

    // 默认选最近有数据的日期
    if (!datesWithData.has(currentDate)) {
      const sorted = [...datesWithData].sort().reverse();
      if (sorted.length) currentDate = sorted[0];
    }

    // 日历定位到当前日期所在月
    const cd = new Date(currentDate + 'T00:00:00');
    calYear  = cd.getFullYear();
    calMonth = cd.getMonth();

    renderCalendar();
    renderHotKeywords(data.hotKeywords || []);

    const meta  = data.meta || {};
    const dayNs = allNews.filter(n => n.date === currentDate);
    const cnCnt = dayNs.filter(n => n.region === 'cn').length;
    const glCnt = dayNs.filter(n => n.region === 'global').length;

    document.getElementById('mainDate').textContent  = fmtDate(currentDate);
    document.getElementById('mainBadge').textContent = `v${meta.version || '4.0'}`;
    document.getElementById('mainMeta').textContent  =
      `共 ${dayNs.length} 条精选 · 国内 ${cnCnt} · 国际 ${glCnt} · 更新于 ${meta.lastUpdate || '—'}`;

    render();

  } catch (e) {
    const msg = e.name === 'AbortError' ? '请求超时，请刷新重试' : `加载失败: ${e.message}`;
    document.getElementById('mainDate').textContent = '加载失败';
    document.getElementById('newsList').innerHTML   =
      `<div class="empty"><div class="empty-icon">⚠️</div><p>${escHtml(msg)}</p></div>`;
  }
}

init();
</script>
</body>
</html>
