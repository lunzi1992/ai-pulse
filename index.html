<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Pulse - AI Coding & 具身智能</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #12121a;
      --bg3: #1a1a25;
      --border: #2a2a3a;
      --text: #e4e4ef;
      --text2: #8888a0;
      --text3: #555568;
      --accent: #7c6af7;
      --accent2: #f76a8c;
      --industry: #f7c26a;
      --tech: #6af7c2;
      --community: #6a9ff7;
      --tools: #f76ad6;
      --radius: 12px;
      --sidebar-w: 260px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ── 侧边栏 ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      padding: 24px 16px;
      position: fixed;
      top: 0; left: 0;
      overflow-y: auto;
      z-index: 100;
    }
    .sidebar-brand {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-brand .logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .sidebar-sub {
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 24px;
    }
    .sidebar-section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text3);
      margin-bottom: 8px;
    }

    /* 日历 */
    .calendar {
      background: var(--bg3);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 20px;
    }
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .calendar-month {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .calendar-nav {
      display: flex;
      gap: 4px;
    }
    .calendar-nav button {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2);
      width: 26px; height: 26px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    .calendar-nav button:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .calendar-day-name {
      font-size: 9px;
      color: var(--text3);
      text-align: center;
      padding: 4px 0;
      font-weight: 500;
    }
    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text2);
      transition: all 0.15s;
      position: relative;
    }
    .calendar-day:hover { background: var(--bg2); color: var(--text); }
    .calendar-day.empty { cursor: default; }
    .calendar-day.today { background: var(--accent); color: #fff; font-weight: 600; }
    .calendar-day.has-data { color: var(--text); font-weight: 500; }
    .calendar-day.has-data::after {
      content: '';
      position: absolute;
      bottom: 3px;
      width: 4px; height: 4px;
      background: var(--accent2);
      border-radius: 50%;
    }
    .calendar-day.active {
      background: var(--accent);
      color: #fff;
    }
    .calendar-day.active.has-data::after { background: #fff; }

    /* 模块导航 */
    .module-nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 20px;
    }
    .module-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text2);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      width: 100%;
    }
    .module-btn:hover { background: var(--bg3); color: var(--text); }
    .module-btn.active { border-color: var(--border); background: var(--bg3); color: var(--text); }
    .module-btn .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .module-btn .badge {
      margin-left: auto;
      font-size: 10px;
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 10px;
      color: var(--text3);
    }
    .module-btn[data-module="industry"] .dot { background: var(--industry); }
    .module-btn[data-module="tech"] .dot { background: var(--tech); }
    .module-btn[data-module="community"] .dot { background: var(--community); }
    .module-btn[data-module="tools"] .dot { background: var(--tools); }

    /* 热词 */
    .hot-keywords {
      margin-bottom: 20px;
    }
    .keyword-tag {
      display: inline-block;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      padding: 4px 8px;
      border-radius: 6px;
      margin: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .keyword-tag:hover { border-color: var(--accent); color: var(--accent); }

    .sidebar-footer {
      font-size: 10px;
      color: var(--text3);
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .sidebar-footer a { color: var(--text3); text-decoration: none; }
    .sidebar-footer a:hover { color: var(--accent); }

    /* ── 主内容 ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 32px 40px;
      max-width: 900px;
    }
    .main-header {
      margin-bottom: 32px;
    }
    .main-date {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .main-date small {
      font-size: 14px;
      font-weight: 400;
      color: var(--text3);
      margin-left: 8px;
    }
    .main-meta {
      font-size: 13px;
      color: var(--text3);
    }

    /* 4模块视图 */
    .modules-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }
    .module-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .module-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .module-card-header .icon {
      font-size: 20px;
    }
    .module-card-header h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .module-card-header .desc {
      font-size: 11px;
      color: var(--text3);
      margin-left: auto;
    }
    .module-card-body {
      padding: 12px 16px;
    }
    .module-card-body .news-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .module-card-body .news-item:last-child { border-bottom: none; }

    /* 新闻列表 */
    .news-section {
      margin-bottom: 40px;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }
    .section-header .icon { font-size: 22px; }
    .section-header h2 { font-size: 18px; font-weight: 700; }
    .section-header .tag {
      margin-left: auto;
      font-size: 11px;
      color: var(--text3);
      background: var(--bg3);
      padding: 4px 10px;
      border-radius: 10px;
    }
    .section-header.industry { border-color: var(--industry); }
    .section-header.tech { border-color: var(--tech); }
    .section-header.community { border-color: var(--community); }
    .section-header.tools { border-color: var(--tools); }

    .news-item {
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }
    .news-item:last-child { border-bottom: none; }
    .news-item-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.5;
      transition: color 0.2s;
    }
    a .news-item-title:hover { color: var(--accent); }
    .news-item-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text3);
      flex-wrap: wrap;
    }
    .news-item-meta .source {
      background: var(--bg3);
      padding: 2px 8px;
      border-radius: 4px;
    }
    .news-item-meta .importance-high {
      color: var(--accent2);
      font-weight: 600;
    }
    .news-item-summary {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.7;
      margin-top: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .news-item-summary.expanded {
      -webkit-line-clamp: unset;
    }
    .read-more {
      font-size: 12px;
      color: var(--accent);
      cursor: pointer;
      margin-top: 6px;
      display: inline-block;
    }
    .news-item-url {
      display: inline-block;
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      margin-top: 8px;
    }
    .news-item-url:hover { text-decoration: underline; }

    /* 筛选栏 */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-bar .label { font-size: 12px; color: var(--text3); }
    .filter-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
    .filter-chip.active { border-color: var(--accent); background: var(--accent); color: #fff; }
    .filter-chip .dot { width: 7px; height: 7px; border-radius: 50%; }
    .filter-chip[data-module="all"] .dot { background: var(--accent); }
    .filter-chip[data-module="industry"] .dot { background: var(--industry); }
    .filter-chip[data-module="tech"] .dot { background: var(--tech); }
    .filter-chip[data-module="community"] .dot { background: var(--community); }
    .filter-chip[data-module="tools"] .dot { background: var(--tools); }

    /* 搜索 */
    .search-box {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 16px 8px 36px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box input::placeholder { color: var(--text3); }
    .search-box .icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 14px; }

    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text3);
      font-size: 14px;
    }

    /* 响应式 */
    @media (max-width: 900px) {
      .modules-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      :root { --sidebar-w: 0px; }
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 20px 16px; }
      .modules-grid { grid-template-columns: 1fr; }
    }

    /* 动画 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .news-item { animation: fadeIn 0.3s ease-out; }
    .module-card { animation: fadeIn 0.3s ease-out; }
  </style>
</head>
<body>

<!-- 侧边栏 -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="logo">🤖</div>
    AI Pulse
  </div>
  <div class="sidebar-sub">AI Coding & 具身智能</div>

  <div class="calendar">
    <div class="calendar-header">
      <span class="calendar-month" id="calMonth"></span>
      <div class="calendar-nav">
        <button onclick="calNav(-1)">‹</button>
        <button onclick="calNav(1)">›</button>
      </div>
    </div>
    <div class="calendar-grid" id="calGrid"></div>
  </div>

  <div class="sidebar-section-title">内容模块</div>
  <div class="module-nav" id="moduleNav"></div>

  <div class="sidebar-section-title">热度关键词</div>
  <div class="hot-keywords" id="hotKeywords"></div>

  <div class="sidebar-footer">
    数据每日自动更新<br>
    <a href="https://github.com/lunzi1992/ai-pulse" target="_blank">GitHub</a> · <a href="https://lunzi1992.github.io/ai-pulse" target="_blank">官网</a>
  </div>
</aside>

<!-- 主内容 -->
<main class="main">
  <div class="main-header">
    <div class="main-date" id="mainDate">加载中...</div>
    <div class="main-meta" id="mainMeta"></div>
  </div>

  <div class="filter-bar">
    <div class="search-box">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索新闻..." oninput="renderNews()">
    </div>
    <span class="label">筛选:</span>
    <button class="filter-chip active" data-module="all" onclick="setModule('all')">
      <span class="dot"></span> 全部
    </button>
    <button class="filter-chip" data-module="industry" onclick="setModule('industry')">
      <span class="dot"></span> 行业动态
    </button>
    <button class="filter-chip" data-module="tech" onclick="setModule('tech')">
      <span class="dot"></span> 技术进展
    </button>
    <button class="filter-chip" data-module="community" onclick="setModule('community')">
      <span class="dot"></span> 社区洞察
    </button>
    <button class="filter-chip" data-module="tools" onclick="setModule('tools')">
      <span class="dot"></span> 工具与应用
    </button>
  </div>

  <!-- 4模块概览 -->
  <div class="modules-grid" id="modulesGrid"></div>

  <!-- 新闻列表 -->
  <div id="newsList"></div>
</main>

<script>
// ── 状态 ──────────────────────────────────────────────────────────────
let allNews = [];
let currentModule = 'all';
let currentDate = new Date().toISOString().split('T')[0];
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let datesWithData = new Set();

// ── 工具函数 ─────────────────────────────────────────────────────────
const MODULE_META = {
  industry:  { icon: '🏢', name: '行业动态', desc: '高频更新·广度优先', color: 'var(--industry)' },
  tech:      { icon: '🔬', name: '技术进展', desc: '论文·模型·开源', color: 'var(--tech)' },
  community: { icon: '💬', name: '社区洞察', desc: '热点趋势·舆情', color: 'var(--community)' },
  tools:     { icon: '🛠️', name: '工具与应用', desc: '落地场景·效率工具', color: 'var(--tools)' }
};

function formatDate(dateStr) {
  const d = new Date(dateStr);
  const weekday = ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
  return `${d.getMonth()+1}月${d.getDate()}日 ${weekday}`;
}

// ── 日历 ─────────────────────────────────────────────────────────────
function renderCalendar() {
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('calMonth').textContent = `${calYear}年 ${monthNames[calMonth]}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '<div class="calendar-day-name">日</div><div class="calendar-day-name">一</div><div class="calendar-day-name">二</div><div class="calendar-day-name">三</div><div class="calendar-day-name">四</div><div class="calendar-day-name">五</div><div class="calendar-day-name">六</div>';

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date().toISOString().split('T')[0];

  for (let i = 0; i < firstDay; i++) {
    grid.innerHTML += '<div class="calendar-day empty"></div>';
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === today;
    const isActive = dateStr === currentDate;
    const hasData = datesWithData.has(dateStr);
    let cls = 'calendar-day';
    if (isToday) cls += ' today';
    else if (isActive) cls += ' active';
    else if (hasData) cls += ' has-data';
    grid.innerHTML += `<div class="${cls}" onclick="selectDate('${dateStr}')">${d}</div>`;
  }
}

function calNav(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function selectDate(date) {
  currentDate = date;
  renderCalendar();
  renderNews();
}

// ── 模块导航 ─────────────────────────────────────────────────────────
function renderModuleNav(counts) {
  const nav = document.getElementById('moduleNav');
  nav.innerHTML = '';
  const order = ['all', 'industry', 'tech', 'community', 'tools'];
  for (const mod of order) {
    const count = mod === 'all' ? allNews.length : (counts[mod] || 0);
    const meta = MODULE_META[mod] || { icon: '📰', name: '全部', color: 'var(--accent)' };
    const active = mod === currentModule ? 'active' : '';
    nav.innerHTML += `
      <button class="module-btn ${active}" data-module="${mod}" onclick="setModule('${mod}')">
        <span class="dot" style="background:${meta.color}"></span>
        ${meta.name}
        <span class="badge">${count}</span>
      </button>`;
  }
}

// ── 热度关键词 ────────────────────────────────────────────────────────
function renderHotKeywords(keywords) {
  const el = document.getElementById('hotKeywords');
  el.innerHTML = keywords.slice(0, 12).map(k =>
    `<span class="keyword-tag" onclick="searchKeyword('${k.name}')">${k.name}</span>`
  ).join('');
}

function searchKeyword(kw) {
  document.getElementById('searchInput').value = kw;
  renderNews();
}

// ── 4模块概览卡片 ────────────────────────────────────────────────────
function renderModulesGrid(todayNews) {
  const grid = document.getElementById('modulesGrid');
  const order = ['industry', 'tech', 'community', 'tools'];
  grid.innerHTML = order.map(mod => {
    const meta = MODULE_META[mod];
    const items = todayNews.filter(n => n.module === mod).slice(0, 3);
    if (items.length === 0) return '';
    return `
      <div class="module-card">
        <div class="module-card-header">
          <span class="icon">${meta.icon}</span>
          <h3 style="color:${meta.color}">${meta.name}</h3>
          <span class="desc">${meta.desc}</span>
        </div>
        <div class="module-card-body">
          ${items.map(n => `
            <div class="news-item">
              <div class="news-item-title">${n.url ? `<a href="${n.url}" target="_blank">${n.title}</a>` : n.title}</div>
              <div class="news-item-meta">
                <span class="source">${n.source}</span>
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }).join('');
}

// ── 新闻列表 ─────────────────────────────────────────────────────────
function renderNews() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allNews.filter(n => {
    const matchModule = currentModule === 'all' || n.module === currentModule;
    const matchDate = n.date === currentDate;
    const matchSearch = !search || n.title.toLowerCase().includes(search) || n.summary.toLowerCase().includes(search);
    return matchModule && matchDate && matchSearch;
  });

  const list = document.getElementById('newsList');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>该日期暂无数据</p></div>`;
    return;
  }

  // 按模块分组显示
  const order = ['industry', 'tech', 'community', 'tools'];
  const grouped = {};
  filtered.forEach(n => { if (!grouped[n.module]) grouped[n.module] = []; grouped[n.module].push(n); });

  let html = '';
  for (const mod of order) {
    const items = grouped[mod];
    if (!items || items.length === 0) continue;
    const meta = MODULE_META[mod];
    html += `
      <div class="news-section">
        <div class="section-header ${mod}">
          <span class="icon">${meta.icon}</span>
          <h2>${meta.name}</h2>
          <span class="desc" style="font-size:12px;color:var(--text3)">${meta.desc}</span>
          <span class="tag">${items.length} 条</span>
        </div>
        ${items.map(n => createNewsItem(n)).join('')}
      </div>`;
  }
  list.innerHTML = html;

  // 更新概览
  const todayNews = allNews.filter(n => n.date === currentDate);
  renderModulesGrid(todayNews);
}

function createNewsItem(n) {
  const impTag = n.importance === 'high' ? '<span class="importance-high">🔥 重要</span>' : '';
  return `
    <div class="news-item">
      <div class="news-item-title">
        ${n.url ? `<a href="${n.url}" target="_blank">${n.title}</a>` : n.title}
      </div>
      <div class="news-item-meta">
        <span class="source">${n.source}</span>
        <span>${n.date}</span>
        ${impTag}
      </div>
      ${n.summary ? `<div class="news-item-summary" id="sum-${n.id}">${n.summary}</div>` : ''}
      ${n.summary && n.summary.length > 200 ? `<span class="read-more" onclick="toggleSummary('${n.id}', this)">展开</span>` : ''}
      ${n.url ? `<a class="news-item-url" href="${n.url}" target="_blank">🔗 阅读原文 →</a>` : ''}
    </div>`;
}

function toggleSummary(id, el) {
  const el2 = document.getElementById('sum-' + id);
  if (el2.classList.contains('expanded')) {
    el2.classList.remove('expanded');
    el.textContent = '展开';
  } else {
    el2.classList.add('expanded');
    el.textContent = '收起';
  }
}

function setModule(mod) {
  currentModule = mod;
  document.querySelectorAll('.filter-chip').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.module === mod);
  });
  renderModuleNav(getCounts());
  renderNews();
}

function getCounts() {
  const counts = {};
  allNews.filter(n => n.date === currentDate).forEach(n => {
    counts[n.module] = (counts[n.module] || 0) + 1;
  });
  return counts;
}

// ── 初始化 ───────────────────────────────────────────────────────────
async function init() {
  document.getElementById('mainDate').innerHTML = '⏳ 加载中...';

  try {
    const resp = await fetch('news.json');
    const data = await resp.json();
    allNews = data.news || [];

    // 收集有数据的日期
    datesWithData = new Set(allNews.map(n => n.date));

    // 找最近有数据的日期作为默认
    if (!datesWithData.has(currentDate)) {
      const dates = [...datesWithData].sort().reverse();
      currentDate = dates[0] || currentDate;
    }

    renderCalendar();
    renderHotKeywords(data.hotKeywords || []);
    renderModuleNav(getCounts());
    renderNews();

    const meta = data.meta || {};
    document.getElementById('mainDate').innerHTML = `${formatDate(currentDate)} <small>AI Pulse</small>`;
    document.getElementById('mainMeta').textContent = `共 ${allNews.filter(n=>n.date===currentDate).length} 条精选 · 版本 ${meta.version || '3.0'}`;

  } catch (e) {
    document.getElementById('mainDate').textContent = '加载失败';
    document.getElementById('newsList').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>数据加载失败: ${e.message}</p></div>`;
  }
}

init();
</script>
</body>
</html>
